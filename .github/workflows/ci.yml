name: Tri-Tier CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Log into Docker Hub securely
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build and Push the Python Backend
      - name: Build and Push API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-api:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api:latest

      # Step 4: Build and Push the Nginx Frontend
      - name: Build and Push Web
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-web:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/my-web:latest
  deploy:
     needs: build-and-push
     runs-on: ubuntu-latest
     steps:
       - name: Deploy to AWS EC2
         uses: appleboy/ssh-action@master
         with:
           host: ${{ secrets.AWS_HOST }}
           username: ubuntu
           key: ${{ secrets.AWS_SSH_KEY }}
           script: |
             cd ~/three-tier-project
             git pull origin main
             docker compose down
             docker compose up -d --build         
