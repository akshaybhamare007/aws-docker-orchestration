server {

	listen 80;
	server_name localhost;

	# Rule 1: The Frontend
        # If the user asks for the root path (/), serve the index.html file
	
	location / {
		root /usr/share/nginx/html;
		index index.html index.htm;
	}

	# Rule 2: The Backend (The Reverse Proxy)
        # If the user asks for /api, secretly forward the traffic to the Python container

	location /api/ {
	proxy_pass http://my-api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
	
	}
}
